# Managers whose NotePM authorship qualifies a page for ingestion.
#
# Filter rule (applied in gastrobrain.notepm_cli):
#   ingest a page iff  updated_at >= notepm_cutoff_date
#                  AND (created_by.user_code OR updated_by.user_code) ∈ resolved_codes
#
# Resolution: name_ja is matched against NotePM's user list (NFKC + whitespace-stripped + lowercased).
# email is used as a fallback when name_ja is missing or ambiguous.
# Run `gb-notepm-dryrun` to verify the mapping before any ingestion.
#
# Append / remove names as the org changes, then re-run the dry-run.
# Kanji shown here is the spelling provided 2026-05-25 by Itsuki; some entries
# (notably 渡邉 vs 渡邊, full-width vs half-width spaces) may need adjustment
# after the first dry-run reports unmatched.

